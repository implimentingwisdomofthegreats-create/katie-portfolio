<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono&display=swap');

        :root {
            --black: #000000;
            --dark: #111111;
            --gray-dark: #333333;
            --gray: #666666;
            --gray-light: #999999;
            --silver: #cccccc;
            --off-white: #f5f5f7;
            --white: #ffffff;
            --warm: #c9a96e;
            --warm-light: #e8d5a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--black);
            color: var(--white);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 24px;
        }

        ::selection {
            background: var(--warm);
            color: var(--black);
        }

        .label {
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gray);
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--gray-dark);
            margin: 32px auto;
        }

        .title {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 400;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .title .period {
            color: var(--warm);
        }

        .subtitle {
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            color: var(--gray);
            margin-top: 24px;
            letter-spacing: 0.04em;
        }

        .back-link {
            margin-top: 64px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gray);
            text-decoration: none;
            border-bottom: 1px solid var(--gray-dark);
            padding-bottom: 4px;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .back-link:hover {
            color: var(--warm);
            border-color: var(--warm);
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }
    </style>
</head>
<body>

<div class="grain"></div>

<span class="label">Test page</span>
<div class="divider"></div>
<h1 class="title">Test<span class="period">.</span></h1>
<p class="subtitle">Nothing here yet — just a blank canvas.</p>

<a href="/" class="back-link">← Back to home</a>

</body>
</html>
