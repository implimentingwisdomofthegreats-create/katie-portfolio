{% extends "base_learning.html" %}
{% block title %}Log In — Learn Any Topic{% endblock %}

{% block content %}
<div class="auth-container">
    <h1 class="auth-title">Learn any topic</h1>
    <p class="auth-subtitle">Log in</p>

    {% if form.errors %}
    <div class="form-errors">
        <ul>
            <li>Invalid username or password.</li>
        </ul>
    </div>
    {% endif %}

    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" placeholder="Username" required>
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" placeholder="Password" required>
        </div>
        <button type="submit" class="auth-btn">Log in</button>
    </form>

    <p class="auth-link">New here? <a href="{% url 'register' %}">Create account</a></p>
</div>
{% endblock %}
